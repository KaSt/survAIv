name: Build Firmware

on:
  release:
    types: [published]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-esp32:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pico-ota
            target: esp32c3
            build_dir: .
            sdkconfig_defaults: sdkconfig.defaults
            artifact: survaiv-pico-ota
          - name: pico-no-ota
            target: esp32c3
            build_dir: .
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.no_ota"
            artifact: survaiv-pico-no-ota
          - name: core
            target: esp32s3
            build_dir: s3
            sdkconfig_defaults: sdkconfig.defaults
            artifact: survaiv-core
          - name: core-no-ota
            target: esp32s3
            build_dir: s3
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.no_ota"
            artifact: survaiv-core-no-ota
          - name: nano
            target: esp32s3
            build_dir: tqt
            sdkconfig_defaults: sdkconfig.defaults
            artifact: survaiv-nano
          - name: nano-no-ota
            target: esp32s3
            build_dir: tqt
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.no_ota"
            artifact: survaiv-nano-no-ota
          - name: atom
            target: esp32s3
            build_dir: atoms3
            sdkconfig_defaults: sdkconfig.defaults
            artifact: survaiv-atom
          - name: atom-no-ota
            target: esp32s3
            build_dir: atoms3
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.no_ota"
            artifact: survaiv-atom-no-ota
          - name: spark
            target: esp32
            build_dir: stickc2
            sdkconfig_defaults: sdkconfig.defaults
            artifact: survaiv-spark
          - name: spark-no-ota
            target: esp32
            build_dir: stickc2
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.no_ota"
            artifact: survaiv-spark-no-ota
          - name: dot
            target: esp32c3
            build_dir: c3oled
            sdkconfig_defaults: sdkconfig.defaults
            artifact: survaiv-dot
          - name: dot-no-ota
            target: esp32c3
            build_dir: c3oled
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.no_ota"
            artifact: survaiv-dot-no-ota

    steps:
      - uses: actions/checkout@v4

      - name: ESP-IDF build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.2
          target: ${{ matrix.target }}
          path: ${{ matrix.build_dir }}
          command: >-
            idf.py
            -D SDKCONFIG_DEFAULTS="${{ matrix.sdkconfig_defaults }}"
            build

      - name: Prepare artifacts
        run: |
          BUILD=${{ matrix.build_dir }}/build
          OUT=artifacts/${{ matrix.artifact }}
          mkdir -p "$OUT"
          cp "$BUILD"/bootloader/bootloader.bin "$OUT/"
          cp "$BUILD"/partition_table/partition-table.bin "$OUT/"
          cp "$BUILD"/ota_data_initial.bin "$OUT/" 2>/dev/null || true
          # Copy app binary (named *.bin in build root, exclude sub-binaries)
          for f in "$BUILD"/*.bin; do
            [ -f "$f" ] && cp "$f" "$OUT/"
          done
          # Generate manifest for ESP Web Tools
          python3 - "$BUILD/flash_args" "$OUT" "${{ matrix.name }}" "${{ matrix.target }}" <<'PYEOF'
          import json, sys, os

          flash_args_path, out_dir, name, target = sys.argv[1], sys.argv[2], sys.argv[3], sys.argv[4]

          chip_family = {
              "esp32c3": "ESP32-C3",
              "esp32s3": "ESP32-S3",
              "esp32":   "ESP32",
          }.get(target, target.upper())

          parts = []
          with open(flash_args_path) as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("--"):
                      continue
                  tokens = line.split()
                  if len(tokens) == 2 and tokens[0].startswith("0x"):
                      offset = int(tokens[0], 16)
                      fname = os.path.basename(tokens[1])
                      if os.path.exists(os.path.join(out_dir, fname)):
                          parts.append({"offset": offset, "path": fname})

          manifest = {
              "name": f"survaiv ({name})",
              "builds": [{
                  "chipFamily": chip_family,
                  "parts": sorted(parts, key=lambda p: p["offset"])
              }]
          }
          with open(os.path.join(out_dir, "manifest.json"), "w") as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
          retention-days: 90

  build-cloud:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Desktop / server
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          # Raspberry Pi Zero / 1 (ARMv6)
          - goos: linux
            goarch: arm
            goarm: "6"
            suffix: armv6
          # Raspberry Pi 2/3/4 32-bit (ARMv7)
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: armv7
          # Onion Omega2+ (MIPS little-endian, softfloat)
          - goos: linux
            goarch: mipsle
            gomips: softfloat
          # Onion Omega 1 (MIPS big-endian, softfloat)
          - goos: linux
            goarch: mips
            gomips: softfloat

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: cloud/go.sum

      - name: Build
        working-directory: cloud
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          ARCH="${{ matrix.suffix || matrix.goarch }}"
          go build -ldflags "-s -w -X main.Version=${VERSION}" \
            -o "survaiv-${GOOS}-${ARCH}${EXT}" .

      - uses: actions/upload-artifact@v4
        with:
          name: survaiv-cloud-${{ matrix.goos }}-${{ matrix.suffix || matrix.goarch }}
          path: cloud/survaiv-*
          retention-days: 90

  # Collect all artifacts into a single release-ready bundle
  bundle:
    needs: [build-esp32, build-cloud]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: List artifacts
        run: find all-artifacts -type f | sort

      - uses: actions/upload-artifact@v4
        with:
          name: survaiv-all-${{ github.sha }}
          path: all-artifacts
          retention-days: 90

  # Deploy web flasher to GitHub Pages on master/nightly
  deploy-pages:
    needs: [build-esp32]
    if: github.ref == 'refs/heads/master' || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: firmware

      - name: Assemble pages site
        run: |
          mkdir -p site/firmware
          # Copy firmware artifacts
          for dir in firmware/survaiv-*; do
            name=$(basename "$dir")
            cp -r "$dir" "site/firmware/$name"
          done
          # Copy docs/ as site root
          cp docs/index.html site/
          cp docs/style.css site/ 2>/dev/null || true
          ls -laR site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
